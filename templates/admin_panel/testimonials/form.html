{% extends "admin_panel/_layout.html" %}
{% block dash %}
<h2 class="mb-4">{{ title }}</h2>
<div class="spartan-card">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% for field in form %}
      <div class="mb-3"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
    {% endfor %}
    <button class="btn btn-spartan">Save</button>
    <a href="{% url 'core:testimonial_list' %}" class="btn btn-ghost">Cancel</a>
  </form>
</div>
{% endblock %}
