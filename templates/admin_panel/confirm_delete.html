{% extends "admin_panel/_layout.html" %}
{% block dash %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="auth-card">
      <h3 class="mb-3"><i class="bi bi-exclamation-triangle-fill text-spartan"></i> {{ title }}</h3>
      <p class="text-muted">Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
      <form method="post" class="d-flex gap-2 mt-4">
        {% csrf_token %}
        <a href="{{ back_url }}" class="btn btn-ghost">Cancel</a>
        <button class="btn btn-spartan ms-auto"><i class="bi bi-trash"></i> Delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
