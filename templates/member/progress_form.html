{% extends "member/_layout.html" %}
{% block dash %}
<h2 class="mb-4">Log Progress</h2>
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="auth-card">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
            <div class="col-md-6"><label class="form-label">{{ field.label }}</label>{{ field }}</div>
          {% endfor %}
        </div>
        <div class="d-flex gap-2 mt-4">
          <button class="btn btn-spartan">Save Entry</button>
          <a href="{% url 'core:my_progress' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
